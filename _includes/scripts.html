<script src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
(function() {
  var toggle = document.getElementById('theme-toggle');
  var iconLight = document.getElementById('theme-icon-light');
  var iconDark = document.getElementById('theme-icon-dark');

  function updateNewsBox(theme) {
    var box = document.getElementById('news-box');
    if (!box) return;
    if (theme === 'light') {
      box.style.borderColor = '#E8E3DD';
      box.style.background = '#F5F1EC';
      box.style.color = '#2C2520';
    } else {
      box.style.borderColor = '#3D3733';
      box.style.background = '#231F1C';
      box.style.color = '';
    }
  }

  function updateIcons(theme) {
    if (theme === 'dark') {
      iconLight.style.display = 'inline';
      iconDark.style.display = 'none';
    } else {
      iconLight.style.display = 'none';
      iconDark.style.display = 'inline';
    }
  }

  var currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
  updateIcons(currentTheme);
  updateNewsBox(currentTheme);

  toggle.addEventListener('click', function() {
    var theme = document.documentElement.getAttribute('data-theme');
    var newTheme = theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    updateIcons(newTheme);
    updateNewsBox(newTheme);
  });
})();
</script>
